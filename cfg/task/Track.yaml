#     sigma_range_train: [0.2, 0.8]  # 训练时 GM 噪声强度范围
#     sigma_range_eval:  [0.2, 0.8]  # 评估时范围
#     tau_range: [0.5, 2.0]          # 相关时间常数 (s)
#     reset_to_zero: true            # episode 开始时是否归零
#   swing:
#     enable: true
#     amp_range_train: [0.0, 0.5]    # 训练时振幅范围 (m/s²)
#     amp_range_eval:  [0.0, 0.5]    # 评估时范围
#     freq_range: [0.3, 1.2]         # 频率范围 (Hz)
#     random_phase: true             # 随机初相位
