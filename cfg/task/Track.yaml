# [2026-05-06 重构] wind 作为总开关，disturbance.mode 决定类型，enable 参数已移除。
# 原版备份：cfg/task/Track_backup_20260506.yaml
#
# 切换说明：
#   wind: false                          → 关闭所有扰动
#   wind: true  (不写 disturbance 块)    → 旧 sinsum（向后兼容）
#   wind: true  + disturbance.mode: "composite" → 新三维复合扰动（推荐训 base policy）
#
# 如需开启 composite 扰动，保持 wind: true 并取消下方注释：

# disturbance:
#   mode: "composite"              # "sinsum"（默认，向后兼容）| "composite"（推荐）
#   horizontal_only: false         # true: 只施加XY扰动；false: 全三维XYZ
#   clip_total: false              # true: 对总扰动幅度截断；false: 不截断
#   bias:
#     enable: true
#     range_train: [-2.0, 2.0]    # 训练时每轴 bias 均匀采样范围 (m/s²)
#     range_eval:  [-2.0, 2.0]    # 评估时范围
#   gauss_markov:
