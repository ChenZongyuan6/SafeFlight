#     train:
      # mass_scale: [0.7, 1.3]
      # inertia_scale: [1.1, 1.1]
      # drag_coef: [0.9, 1.1]
      # tau_scale: [1.3, 1.3]
      # t2w_scale: [0.7, 0.7]
# ======================================================================
# 扰动配置说明（与 TrackResidual.yaml 逻辑完全相同）
# obs 中不包含扰动信息，base policy 靠自适应应对
